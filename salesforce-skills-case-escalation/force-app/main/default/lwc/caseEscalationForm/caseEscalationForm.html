<template>
    <lightning-card title="Case Escalation" icon-name="standard:case">
        <div class="slds-p-around_medium">

            <template lwc:if={isLoading}>
                <div class="slds-align_absolute-center slds-p-around_medium">
                    <lightning-spinner alternative-text="Loading" size="small"></lightning-spinner>
                </div>
            </template>

            <template lwc:else>
                <template lwc:if={hasCases}>
                    <table class="slds-table slds-table_cell-buffer slds-table_bordered slds-table_col-bordered">
                        <thead>
                            <tr class="slds-line-height_reset">
                                <th scope="col">
                                    <div class="slds-truncate" title="Case Number">Case Number</div>
                                </th>
                                <th scope="col">
                                    <div class="slds-truncate" title="Subject">Subject</div>
                                </th>
                                <th scope="col">
                                    <div class="slds-truncate" title="Status">Status</div>
                                </th>
                                <th scope="col">
                                    <div class="slds-truncate" title="Priority">Priority</div>
                                </th>
                                <th scope="col">
                                    <div class="slds-truncate" title="Action">Action</div>
                                </th>
                            </tr>
                        </thead>
                        <template for:each={cases} for:item="caseItem">
                            <tbody key={caseItem.Id}>
                                <tr>
                                    <td data-label="Case Number">
                                        <div class="slds-truncate">{caseItem.CaseNumber}</div>
                                    </td>
                                    <td data-label="Subject">
                                        <div class="slds-truncate">{caseItem.Subject}</div>
                                    </td>
                                    <td data-label="Status">
                                        <div class="slds-truncate">{caseItem.Status}</div>
                                    </td>
                                    <td data-label="Priority">
                                        <div class="slds-truncate">{caseItem.Priority}</div>
                                    </td>
                                    <td data-label="Action">
                                        <lightning-button
                                            label="Escalate"
                                            variant="destructive-text"
                                            data-id={caseItem.Id}
                                            onclick={handleEscalateClick}>
                                        </lightning-button>
                                    </td>
                                </tr>
                                <template lwc:if={caseItem.showPanel}>
                                    <tr>
                                        <td colspan="5">
                                            <div class="slds-box slds-box_x-small slds-m-vertical_x-small escalation-panel">
                                                <h3 class="slds-text-heading_small slds-m-bottom_small">
                                                    Escalate Case {caseItem.CaseNumber}
                                                </h3>
                                                <div class="slds-form slds-form_stacked">
                                                    <lightning-textarea
                                                        label="Escalation Reason"
                                                        required
                                                        placeholder="Describe the reason for escalation..."
                                                        data-id={caseItem.Id}
                                                        data-field="reason"
                                                        value={caseItem.reason}
                                                        onchange={handleInputChange}>
                                                    </lightning-textarea>
                                                    <div class="slds-m-top_small">
                                                        <lightning-combobox
                                                            label="New Priority"
                                                            value={caseItem.newPriority}
                                                            options={priorityOptions}
                                                            data-id={caseItem.Id}
                                                            data-field="newPriority"
                                                            onchange={handleInputChange}>
                                                        </lightning-combobox>
                                                    </div>
                                                    <div class="slds-m-top_medium slds-button-group">
                                                        <lightning-button
                                                            label="Confirm Escalation"
                                                            variant="brand"
                                                            data-id={caseItem.Id}
                                                            onclick={handleConfirm}>
                                                        </lightning-button>
                                                        <lightning-button
                                                            label="Cancel"
                                                            variant="neutral"
                                                            class="slds-m-left_x-small"
                                                            data-id={caseItem.Id}
                                                            onclick={handleCancel}>
                                                        </lightning-button>
                                                    </div>
                                                </div>
                                            </div>
                                        </td>
                                    </tr>
                                </template>
                            </tbody>
                        </template>
                    </table>
                </template>

                <template lwc:else>
                    <div class="slds-align_absolute-center slds-p-around_large">
                        <p class="slds-text-body_regular slds-text-color_weak">No open cases found.</p>
                    </div>
                </template>
            </template>

        </div>
    </lightning-card>
</template>
