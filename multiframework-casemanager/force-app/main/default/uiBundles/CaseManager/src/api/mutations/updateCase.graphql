mutation UpdateCase($id: IdOrRef!, $status: Picklist!) {
  uiapi {
    CaseUpdate(
      input: {
        Id: $id
        Case: {
          Status: $status
        }
      }
    ) {
      Record {
        Id
        CaseNumber {
          value
        }
        Status {
          value
        }
      }
      success
    }
  }
}
